<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balance Sheet Analyzer</title>
    <script src="xlsx.full.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Balance Sheet Analyzer</h1>
            <p>Upload double-entry XLSX to view Assets vs Liabilities + Equity</p>
        </header>
        
        <div class="controls">
            <input type="file" id="xlsxFile" accept=".xlsx" />
            <button id="loadBtn">Load Balance Sheet</button>

            <button id="downloadTemplateBtn">Download Template</button>
            <button id="ratiosBtn" style="background: linear-gradient(45deg, #FF8C00, #FFA500);">Calculate Ratios</button>
        </div>

        
        <div id="balanceStatus" class="status"></div>
        
        <div class="balance-sheet">
            <div class="column left">
                <h2>Assets</h2>
                <table id="assetsTable">
                    <thead>
                        <tr>
                            <th>Account</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                    <tfoot>
                        <tr>
                            <td>Total Assets</td>
                            <td id="totalAssets">$0.00</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
            
            <div class="column right">
                <h2>Liabilities & Equity</h2>
                <table id="liabsTable">
                    <thead>
                        <tr>
                            <th>Account</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                    <tfoot>
                        <tr>
                            <td>Total Liabilities + Equity</td>
                            <td id="totalLiabs">$0.00</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>
    
    <script src="javascript.js"></script>
</body>
</html>
